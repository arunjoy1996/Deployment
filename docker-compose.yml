version: "3.8"

services:
  backend:
    build: .
    container_name: ml-api
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - backend
